<style>
  @import url("https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap");

  .barra-apps {
    background: #959ca3;
  }

  .barra-apps-links {
    display: flex;
    gap: 1.35rem;
    align-items: stretch;
    padding: 0;
    overflow-x: auto;
    white-space: nowrap;
  }

  .barra-apps-link {
    display: flex;
    align-items: center;
    padding: 0 0.5rem;
    font-family: "Orbitron", "Consolas", sans-serif;
    font-size: 0.72rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    text-decoration: none;
    color: #eef2f7;
    transition: color 0.15s ease-in-out;
  }

  .barra-apps-link:first-child {
    margin-left: 0.95rem;
  }

  .barra-apps-link:hover {
    color: #ffffff;
  }

  .barra-apps-link.activa {
    background: #212529;
    color: #f8f9fa;
    font-weight: 700;
    border-radius: 0;
  }
</style>

<div class="barra-apps">
  <div class="container-fluid barra-apps-links">
    <a
      class="barra-apps-link {% if request.resolver_match.namespace == 'asistencias' %}activa{% endif %}"
      href="{% url 'asistencias:dashboard' %}?periodo_mes={{ periodo_mes }}&periodo_anio={{ periodo_anio }}{% if organizacion_id %}&organizacion={{ organizacion_id }}{% endif %}"
    >
      ASISTENCIAS
    </a>
    <a
      class="barra-apps-link {% if request.resolver_match.namespace == 'finanzas' %}activa{% endif %}"
      href="{% url 'finanzas:dashboard' %}?periodo_mes={{ periodo_mes }}&periodo_anio={{ periodo_anio }}{% if organizacion_id %}&organizacion={{ organizacion_id }}{% endif %}"
    >
      FINANZAS
    </a>
    <a
      class="barra-apps-link {% if request.resolver_match.namespace == 'personas' %}activa{% endif %}"
      href="{% url 'personas:dashboard' %}?periodo_mes={{ periodo_mes }}&periodo_anio={{ periodo_anio }}{% if organizacion_id %}&organizacion={{ organizacion_id }}{% endif %}"
    >
      PERSONAS
    </a>
    <a
      class="barra-apps-link {% if request.resolver_match.namespace == 'monitor' %}activa{% endif %}"
      href="{% url 'monitor:dashboard' %}?periodo_mes={{ periodo_mes }}&periodo_anio={{ periodo_anio }}{% if organizacion_id %}&organizacion={{ organizacion_id }}{% endif %}"
    >
      MONITOR
    </a>
  </div>
</div>
