name: deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      DJANGO_ENV: dev
      POSTGRES_DB: plataforma_elemental_dev
      POSTGRES_USER: elementos
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_PORT: 5432

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: plataforma_elemental_dev
          POSTGRES_USER: elementos
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U elementos -d plataforma_elemental_dev"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install development dependencies
        run: pip install -r requirements-dev.txt

      - name: Run lint
        run: ruff check .

      - name: Run test suite
        run: python manage.py test asistencias.tests personas.tests finanzas.tests api.tests

  deploy:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Validate deploy secrets
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_SERVICE: ${{ secrets.DEPLOY_SERVICE }}
          DEPLOY_ENV_FILE: ${{ secrets.DEPLOY_ENV_FILE }}
          DEPLOY_VENV_DIR: ${{ secrets.DEPLOY_VENV_DIR }}
          DEPLOY_PYTHON_BIN: ${{ secrets.DEPLOY_PYTHON_BIN }}
        run: |
          set -euo pipefail

          missing=0

          # Validamos antes de abrir SSH para fallar con un mensaje claro cuando falte un secret esencial.
          for required_var in DEPLOY_HOST DEPLOY_USER DEPLOY_SSH_KEY DEPLOY_PATH DEPLOY_SERVICE; do
            if [[ -z "${!required_var:-}" ]]; then
              echo "Falta el secret requerido ${required_var}. El deploy no puede continuar sin ese valor." >&2
              missing=1
            fi
          done

          # Estas variables son opcionales porque scripts/deploy.sh ya soporta valores vacios
          # y aplica defaults internos.
          # DEPLOY_PORT tambien es opcional: si no existe, el workflow usa el puerto 22.
          # Opcionales:
          # - DEPLOY_ENV_FILE
          # - DEPLOY_VENV_DIR
          # - DEPLOY_PYTHON_BIN
          if [[ "$missing" -ne 0 ]]; then
            exit 1
          fi

      - name: Configure SSH
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_SSH_KEY_B64: ${{ secrets.DEPLOY_SSH_KEY_B64 }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          printf "%s" "$DEPLOY_SSH_KEY_B64" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          ssh-keygen -y -f ~/.ssh/deploy_key >/dev/null

          touch ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts
          ssh-keyscan -p "${DEPLOY_PORT:-22}" -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts
          
      - name: Debug SSH key file
        env:
          DEPLOY_SSH_KEY_B64: ${{ secrets.DEPLOY_SSH_KEY_B64 }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf "%s" "$DEPLOY_SSH_KEY_B64" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          echo "bytes: $(wc -c < ~/.ssh/deploy_key)"
          echo "first line: $(head -n 1 ~/.ssh/deploy_key)"
          echo "last line: $(tail -n 1 ~/.ssh/deploy_key)"
          ssh-keygen -lf ~/.ssh/deploy_key

      - name: Deploy to production
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_SERVICE: ${{ secrets.DEPLOY_SERVICE }}
          DEPLOY_ENV_FILE: ${{ secrets.DEPLOY_ENV_FILE }}
          DEPLOY_VENV_DIR: ${{ secrets.DEPLOY_VENV_DIR }}
          DEPLOY_PYTHON_BIN: ${{ secrets.DEPLOY_PYTHON_BIN }}
        run: |
          set -euo pipefail

          # -i ~/.ssh/deploy_key evita depender del nombre por defecto de OpenSSH
          # y asegura que el workflow use exactamente la clave exclusiva de deploy.
          # StrictHostKeyChecking=yes mantiene la validacion del host remoto contra known_hosts.
          ssh \
            -i ~/.ssh/deploy_key \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile=~/.ssh/known_hosts \
            -p "${DEPLOY_PORT:-22}" \
            "${DEPLOY_USER}@${DEPLOY_HOST}" <<EOF
          set -euo pipefail
          cd "${DEPLOY_PATH}"
          git fetch --prune origin
          git checkout main
          git reset --hard origin/main
          export DEPLOY_SERVICE="${DEPLOY_SERVICE}"
          export DEPLOY_ENV_FILE="${DEPLOY_ENV_FILE}"
          export DEPLOY_VENV_DIR="${DEPLOY_VENV_DIR}"
          export DEPLOY_PYTHON_BIN="${DEPLOY_PYTHON_BIN}"
          bash scripts/deploy.sh
          EOF
