{% extends "finanzas/base_finanzas.html" %}
{% block title %}{{ title }}{% endblock %}
{% block content %}
<div class="mt-4">
  <div class="card border-danger">
    <div class="card-header text-bg-danger">{{ title }}</div>
    <div class="card-body">
      <p>¿Seguro que quieres eliminar <strong>{{ obj }}</strong>?</p>
      <form method="post">
        {% csrf_token %}
        <button class="btn btn-danger finanzas-btn" type="submit" title="Eliminar">
          <i class="bi bi-trash"></i><span class="finanzas-btn-label">Eliminar</span>
        </button>
        <a class="btn btn-outline-secondary finanzas-btn" href="{{ back_url }}" title="Cancelar">
          <i class="bi bi-x-circle"></i><span class="finanzas-btn-label">Cancelar</span>
        </a>
      </form>
    </div>
  </div>
</div>
{% endblock %}
