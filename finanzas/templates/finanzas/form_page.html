{% extends "finanzas/base_finanzas.html" %}
{% block title %}{{ title }}{% endblock %}
{% block content %}
<div class="mt-4">
  <div class="card">
    <div class="card-header">{{ title }}</div>
    <div class="card-body">
      <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="d-flex gap-2">
          <button class="btn btn-primary finanzas-btn" type="submit" title="Guardar">
            <i class="bi bi-save"></i><span class="finanzas-btn-label">Guardar</span>
          </button>
          <a class="btn btn-outline-secondary finanzas-btn" href="{{ back_url }}" title="Volver">
            <i class="bi bi-arrow-left"></i><span class="finanzas-btn-label">Volver</span>
          </a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
